name: Frontend Build and Deploy

on:
  push:
    branches: [ "chore/migrate-deploy-to-hpe" ]
    # TEMP: deploying from migration branch for live workflow validation.
    # Restore to [ "main" ] before merging this branch into main.
  workflow_dispatch: {}
    # Manual trigger — kept permanently as a redeploy safety net.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_LIFF_ID: ${{ secrets.VITE_LIFF_ID }}
          VITE_LINE_CLIENT_ID: ${{ secrets.VITE_LINE_CLIENT_ID }}
          VITE_OPEN_AI_API_KEY: ${{ secrets.VITE_OPEN_AI_API_KEY }}
        run: npm run build

      - name: List dist folder
        run: ls -alh dist

      - name: Setup SSH for deploy
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete-after \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o IdentitiesOnly=yes" \
            dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Post-deploy verification
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o IdentitiesOnly=yes \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && echo '== file count ==' && find . -type f | wc -l && echo '== total size ==' && du -sh . && echo '== index.html sha256 ==' && sha256sum index.html"
