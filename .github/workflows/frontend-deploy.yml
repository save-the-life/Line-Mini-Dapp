name: Frontend Build and Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}
    # Manual trigger — kept permanently as a redeploy safety net.

jobs:
  build-and-deploy:
    runs-on: [self-hosted, korea]
    # Self-hosted runner on the HPE server (Korean IP).
    # The HPE server's SSH is restricted to Korean IPs, so GitHub-hosted runners
    # can't reach it. The runner runs as the digiray user, with direct local
    # access to DEPLOY_PATH — no SSH/rsync-over-network needed.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        # Use `npm install`, not `npm ci`. An all-optional transitive chain
        # (@base-org/account → @coinbase/cdp-sdk → @solana/kit) leaves a dangling
        # dependency reference that npm cannot materialize into the lockfile, so
        # strict `npm ci` fails with "Missing: @solana/kit@... from lock file".
        # `npm install` tolerates the skipped optional dep while still installing
        # required platform optionals (e.g. esbuild's native binary).
        run: npm install --no-audit --no-fund

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_LIFF_ID: ${{ secrets.VITE_LIFF_ID }}
          VITE_LINE_CLIENT_ID: ${{ secrets.VITE_LINE_CLIENT_ID }}
          VITE_OPEN_AI_API_KEY: ${{ secrets.VITE_OPEN_AI_API_KEY }}
        run: npm run build

      - name: List dist folder
        run: ls -alh dist

      - name: Deploy via local rsync
        run: |
          rsync -av --delete-after \
            dist/ \
            ${{ secrets.DEPLOY_PATH }}

      - name: Post-deploy verification
        run: |
          cd ${{ secrets.DEPLOY_PATH }}
          echo "== file count =="
          find . -type f | wc -l
          echo "== total size =="
          du -sh .
          echo "== index.html sha256 =="
          sha256sum index.html
