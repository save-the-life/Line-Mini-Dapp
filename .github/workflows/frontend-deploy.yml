name: Frontend Build and Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}
    # Manual trigger — kept permanently as a redeploy safety net.

# NOTE: Production is still served from AWS S3 + CloudFront. The DNS cutover to
# the HPE server is NOT complete yet, so deploys must target AWS (the live
# origin). The HPE rsync deploy is parked until DNS is switched over.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        # Use `npm install`, not `npm ci`. An all-optional transitive chain
        # (@base-org/account → @coinbase/cdp-sdk → @solana/kit) leaves a dangling
        # dependency reference that npm cannot materialize into the lockfile, so
        # strict `npm ci` fails with "Missing: @solana/kit@... from lock file".
        run: npm install --no-audit --no-fund

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_LIFF_ID: ${{ secrets.VITE_LIFF_ID }}
          VITE_LINE_CLIENT_ID: ${{ secrets.VITE_LINE_CLIENT_ID }}
          VITE_OPEN_AI_API_KEY: ${{ secrets.VITE_OPEN_AI_API_KEY }}
        run: npm run build

      - name: List dist folder
        run: ls -alh dist

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://digiray-prd-s3 --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E2CL56B2QXHA8S --paths "/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
